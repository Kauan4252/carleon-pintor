<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carleon Pintor — Orçamento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --azul: #1a3a6b;
  --azul-esc: #112749;
  --laranja: #f5a623;
  --laranja-esc: #d4891a;
  --borda: #dde3ee;
  --bg: #f0f3f9;
  --txt: #1a2540;
}

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  font-family: 'Barlow', Arial, sans-serif;
  background: var(--bg);
  padding: 12px 10px 60px;

  /* Garante que o body ocupe TODA a largura disponível no iframe */
  width: 100%;
  overflow-x: hidden;
}

/* ── TOPO ── */
.topo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.badge {
  background: var(--azul);
  color: #fff;
  font-family: 'Barlow Condensed', Arial, sans-serif;
  font-weight: 900;
  font-size: 14px;
  letter-spacing: 1px;
  padding: 6px 13px;
  border-radius: 7px;
  white-space: nowrap;
}
.badge span { color: var(--laranja); }
.sub {
  font-size: 10px;
  color: #7a8caa;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* ── CARD ── */
.card {
  background: #fff;
  border-radius: 12px;
  padding: 18px 14px;
  width: 100%;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(26,58,107,0.12);
}

.card-titulo {
  font-family: 'Barlow Condensed', Arial, sans-serif;
  font-size: 24px;
  font-weight: 900;
  color: var(--azul);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-titulo::before {
  content: '';
  width: 5px; height: 24px;
  background: var(--laranja);
  border-radius: 3px;
  display: block;
  flex-shrink: 0;
}

/* ── GRID 2 COLS ── */
.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

label {
  display: block;
  font-size: 10px;
  font-weight: 800;
  color: var(--azul);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 5px;
}

input[type=text],
input[type=number] {
  width: 100%;
  padding: 12px 11px;
  border: 1.5px solid var(--borda);
  border-radius: 9px;
  font-size: 16px;
  font-family: 'Barlow', Arial, sans-serif;
  color: var(--txt);
  outline: none;
  background: #fff;
  -webkit-appearance: none;
  appearance: none;
}
input:focus { border-color: var(--azul); }
input::placeholder { color: #b8c4d8; }

/* ── ITENS ── */
.sec-titulo {
  font-size: 10px;
  font-weight: 800;
  color: var(--azul);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.cab {
  display: grid;
  grid-template-columns: 1fr 68px 38px;
  gap: 8px;
  margin-bottom: 4px;
}
.cab span {
  font-size: 10px;
  color: #a0b0cc;
  font-weight: 700;
  text-transform: uppercase;
}
.cab span:nth-child(2) { text-align: center; }

.item-row {
  display: grid;
  grid-template-columns: 1fr 68px 38px;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}
.item-row input { padding: 10px 9px; font-size: 15px; }
.item-row .iq { text-align: center; }

.btn-del {
  width: 38px; height: 42px;
  border: 1.5px solid var(--borda);
  border-radius: 9px;
  background: none;
  color: #bbb;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
}
.btn-del:active { border-color: #e24b4a; color: #e24b4a; }

.btn-add {
  width: 100%;
  padding: 11px;
  border: 1.5px dashed #b0bcd4;
  border-radius: 9px;
  background: none;
  color: var(--azul);
  font-size: 14px;
  font-family: 'Barlow', Arial, sans-serif;
  font-weight: 700;
  cursor: pointer;
  margin: 2px 0 18px;
  touch-action: manipulation;
}
.btn-add:active { background: #eef2fa; }

.btn-gerar {
  width: 100%;
  padding: 15px;
  background: var(--azul);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-family: 'Barlow', Arial, sans-serif;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
}
.btn-gerar:active { background: var(--azul-esc); }

/* ── PREVIEW ── */
.preview-wrap { width: 100%; display: none; }

.acoes { display: flex; gap: 10px; margin-bottom: 14px; }
.btn-jpg {
  flex: 1;
  padding: 14px;
  background: var(--laranja);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Barlow', Arial, sans-serif;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
}
.btn-jpg:active { background: var(--laranja-esc); }
.btn-novo {
  padding: 14px 14px;
  background: #fff;
  color: var(--azul);
  border: 2px solid var(--azul);
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Barlow', Arial, sans-serif;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
  touch-action: manipulation;
}
.btn-novo:active { background: #eef2fa; }

/* ── RECIBO ── */
#recibo {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  width: 100%;
  box-shadow: 0 4px 20px rgba(26,58,107,0.12);
}

.r-header {
  background: var(--azul);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  /* Garante que o header não estoure */
  width: 100%;
  min-width: 0;
}
.r-brand-tag {
  background: var(--laranja);
  color: #fff;
  font-family: 'Barlow Condensed', Arial, sans-serif;
  font-weight: 900;
  font-size: 13px;
  padding: 5px 11px;
  border-radius: 6px;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}
.r-icons { display: flex; gap: 6px; flex-shrink: 0; }
.r-ico {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--laranja);
  display: flex;
  align-items: center;
  justify-content: center;
}
.r-ico svg { width: 15px; height: 15px; }

.r-body { padding: 18px 14px 0; }

.r-topo {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 6px;
  gap: 8px;
}
.r-titulo {
  font-family: 'Barlow Condensed', Arial, sans-serif;
  font-size: 36px;
  font-weight: 900;
  color: var(--azul);
  letter-spacing: -1px;
  line-height: 1;
}
.r-data { font-size: 11px; color: #444; font-weight: 600; white-space: nowrap; }
.r-data b { border-bottom: 1.5px solid #444; margin-left: 3px; }

.r-cliente { font-size: 13px; color: #333; margin-bottom: 14px; font-weight: 600; }
.r-cliente b { border-bottom: 1.5px solid #333; margin-left: 4px; }

table { width: 100%; border-collapse: collapse; }
table thead tr { background: var(--azul); }
table thead td {
  color: #fff;
  font-weight: 800;
  font-size: 11px;
  padding: 10px 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-family: 'Barlow', Arial, sans-serif;
}
table thead td:last-child { text-align: center; width: 36%; }
table tbody tr.il { border-bottom: 1px solid var(--borda); }
table tbody td {
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--azul);
  font-family: 'Barlow', Arial, sans-serif;
  word-break: break-word;
}
table tbody td:last-child { text-align: center; }
table tbody tr.tl { background: var(--azul); }
table tbody tr.tl td { color: #fff; font-weight: 800; font-size: 14px; padding: 12px; }

.r-space { height: 36px; }

.r-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 14px 18px;
  gap: 8px;
}
.r-contato { font-size: 12px; color: #666; line-height: 2; font-weight: 600; }
.r-brand-bot { text-align: right; flex-shrink: 0; }
.r-brand-bot .rb {
  background: var(--laranja);
  color: #fff;
  font-family: 'Barlow Condensed', Arial, sans-serif;
  font-weight: 900;
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 5px;
  display: inline-block;
  letter-spacing: 1px;
}
.r-brand-bot .rs {
  font-size: 10px;
  color: var(--azul);
  font-weight: 700;
  letter-spacing: 1px;
  margin-top: 4px;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="topo">
  <div class="badge">CARLEON <span>PINTOR</span></div>
  <div class="sub">Pinturas em Gerais</div>
</div>

<div class="card" id="form-section">
  <div class="card-titulo">Novo Orçamento</div>

  <div class="grid2">
    <div>
      <label>Cliente</label>
      <input type="text" id="f-cliente" placeholder="Ex: Luiz Carlos" autocomplete="off" autocorrect="off">
    </div>
    <div>
      <label>Mão de obra (R$)</label>
      <input type="number" id="f-valor" placeholder="Ex: 2500" inputmode="decimal">
    </div>
  </div>

  <div class="sec-titulo">Itens do orçamento</div>
  <div class="cab">
    <span>Descrição</span>
    <span>Qtd</span>
    <span></span>
  </div>

  <div id="lista-itens">
    <div class="item-row">
      <input type="text" class="id" placeholder="Ex: Balde de tinta" autocomplete="off" autocorrect="off">
      <input type="text" class="iq" placeholder="01">
      <button class="btn-del" onclick="delItem(this)">×</button>
    </div>
  </div>

  <button class="btn-add" onclick="addItem()">+ Adicionar item</button>
  <button class="btn-gerar" onclick="gerar()">Gerar Orçamento</button>
</div>

<div class="preview-wrap" id="preview-section">
  <div class="acoes">
    <button class="btn-jpg" onclick="baixarJPG()">💾 Salvar como JPG</button>
    <button class="btn-novo" onclick="novo()">← Novo</button>
  </div>
  <div id="recibo">
    <div class="r-header">
      <div class="r-brand-tag">CARLEON PINTOR</div>
      <div class="r-icons">
        <div class="r-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
        <div class="r-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="13" height="8" rx="2"/><path d="M16 7h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
        <div class="r-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg></div>
      </div>
    </div>
    <div class="r-body">
      <div class="r-topo">
        <div class="r-titulo">ORÇAMENTO</div>
        <div class="r-data">DATA: <b id="r-data"></b></div>
      </div>
      <div class="r-cliente">Cliente: <b id="r-cliente"></b></div>
      <table>
        <thead><tr><td>Descrição</td><td>Quantidade</td></tr></thead>
        <tbody id="r-tbody"></tbody>
      </table>
      <div class="r-space"></div>
    </div>
    <div class="r-footer">
      <div class="r-contato">(86) 9 9447-8374<br>@carleonpintor</div>
      <div class="r-brand-bot">
        <div class="rb">CARLEON PINTOR</div>
        <div class="rs">Pinturas em Gerais</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CORREÇÃO IFRAME GAS ──
// O GAS serve o HTML dentro de um iframe — a viewport do CSS pode não refletir
// a largura real. Forçamos via JS logo ao carregar.
(function() {
  var w = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
  if (w && w > 0) {
    document.body.style.width = w + 'px';
  }
  // Remove qualquer zoom residual que o GAS às vezes aplica
  var meta = document.querySelector('meta[name=viewport]');
  if (meta) meta.setAttribute('content', 'width=' + w + ', initial-scale=1.0');
})();

function addItem() {
  var list = document.getElementById('lista-itens');
  var row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = '<input type="text" class="id" placeholder="Descrição do item" autocomplete="off"><input type="text" class="iq" placeholder="Qtd"><button class="btn-del" onclick="delItem(this)">×</button>';
  list.appendChild(row);
  row.querySelector('.id').focus();
}

function delItem(btn) {
  if (document.querySelectorAll('.item-row').length === 1) return;
  btn.closest('.item-row').remove();
}

function hoje() {
  return new Date().toLocaleDateString('pt-BR');
}

function gerar() {
  var cliente = document.getElementById('f-cliente').value.trim();
  var valor   = document.getElementById('f-valor').value.trim();
  if (!cliente) { alert('Preencha o nome do cliente.'); return; }
  var rows = document.querySelectorAll('.item-row');
  var html = '', tem = false;
  for (var i = 0; i < rows.length; i++) {
    var desc = rows[i].querySelector('.id').value.trim();
    var qtd  = rows[i].querySelector('.iq').value.trim();
    if (desc) {
      tem = true;
      html += '<tr class="il"><td>' + desc + '</td><td>' + (qtd || '—') + '</td></tr>';
    }
  }
  if (!tem) { alert('Adicione pelo menos um item.'); return; }
  var vNum = parseFloat(valor.replace(',', '.'));
  var vFmt = isNaN(vNum) ? '—' : 'R$ ' + vNum.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
  html += '<tr class="tl"><td>MÃO DE OBRA</td><td>' + vFmt + '</td></tr>';
  document.getElementById('r-data').textContent    = hoje();
  document.getElementById('r-cliente').textContent = cliente.toUpperCase();
  document.getElementById('r-tbody').innerHTML     = html;
  document.getElementById('form-section').style.display  = 'none';
  document.getElementById('preview-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function novo() {
  document.getElementById('form-section').style.display  = 'block';
  document.getElementById('preview-section').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function baixarJPG() {
  var btn = document.querySelector('.btn-jpg');
  btn.textContent = 'Gerando…';
  btn.disabled = true;

  var el = document.getElementById('recibo');
  var largOrig = el.style.width;
  var CAPTURA_W = 600;
  el.style.width = CAPTURA_W + 'px';

  setTimeout(function() {
    var elH   = el.scrollHeight;
    var A4_W  = 2480, A4_H = 3508;
    var scale = A4_W / CAPTURA_W;

    html2canvas(el, {
      scale: scale,
      backgroundColor: '#ffffff',
      useCORS: true,
      allowTaint: true,
      width: CAPTURA_W,
      height: elH,
      windowWidth: CAPTURA_W,
      windowHeight: elH,
      scrollX: 0,
      scrollY: 0
    }).then(function(canvas) {
      el.style.width = largOrig;
      var final = document.createElement('canvas');
      final.width = A4_W; final.height = A4_H;
      var ctx = final.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, A4_W, A4_H);
      var dw = canvas.width, dh = canvas.height;
      if (dw > A4_W) { dh = Math.round(dh * A4_W / dw); dw = A4_W; }
      if (dh > A4_H) { dw = Math.round(dw * A4_H / dh); dh = A4_H; }
      ctx.drawImage(canvas, Math.round((A4_W - dw) / 2), 0, dw, dh);
      var link = document.createElement('a');
      var nome = document.getElementById('r-cliente').textContent.replace(/ /g, '_');
      var data = document.getElementById('r-data').textContent.replace(/\//g, '-');
      link.download = 'Orcamento_' + nome + '_' + data + '.jpg';
      link.href = final.toDataURL('image/jpeg', 0.96);
      link.click();
      btn.textContent = '💾 Salvar como JPG';
      btn.disabled = false;
    }).catch(function() {
      el.style.width = largOrig;
      alert('Erro ao gerar imagem.');
      btn.textContent = '💾 Salvar como JPG';
      btn.disabled = false;
    });
  }, 150);
}
</script>
</body>
</html>
